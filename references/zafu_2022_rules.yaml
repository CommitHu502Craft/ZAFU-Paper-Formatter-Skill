school: zafu
version: 2022
document_type: undergraduate_thesis
page:
  paper: A4
  margin_top_cm: 2.7
  margin_bottom_cm: 2.7
  margin_left_cm: 2.7
  margin_right_cm: 2.7
  header_cm: 1.8
